services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safequery
      POSTGRES_USER: safequery
      POSTGRES_PASSWORD: safequery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SAFEQUERY_DATABASE_URL: postgresql://safequery:safequery@postgres:5432/safequery
      SAFEQUERY_CORS_ORIGINS: http://localhost:3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
