services:
  app-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${APP_POSTGRES_DB:?Missing APP_POSTGRES_DB. Copy .env.example to .env.}
      POSTGRES_USER: ${APP_POSTGRES_USER:?Missing APP_POSTGRES_USER. Copy .env.example to .env.}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:?Missing APP_POSTGRES_PASSWORD. Copy .env.example to .env.}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - app_postgres_data:/var/lib/postgresql/data

  business-postgres-source:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BUSINESS_POSTGRES_SOURCE_DB:?Missing BUSINESS_POSTGRES_SOURCE_DB. Copy .env.example to .env.}
      POSTGRES_USER: ${BUSINESS_POSTGRES_SOURCE_USER:?Missing BUSINESS_POSTGRES_SOURCE_USER. Copy .env.example to .env.}
      POSTGRES_PASSWORD: ${BUSINESS_POSTGRES_SOURCE_PASSWORD:?Missing BUSINESS_POSTGRES_SOURCE_PASSWORD. Copy .env.example to .env.}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - business_postgres_source_data:/var/lib/postgresql/data

  business-mssql-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${BUSINESS_MSSQL_SOURCE_SA_PASSWORD:?Missing BUSINESS_MSSQL_SOURCE_SA_PASSWORD. Copy .env.example to .env.}

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      app-postgres:
        condition: service_healthy
    environment:
      SAFEQUERY_APP_NAME: ${SAFEQUERY_APP_NAME:-SafeQuery API}
      SAFEQUERY_ENVIRONMENT: ${SAFEQUERY_ENVIRONMENT:-development}
      SAFEQUERY_APP_POSTGRES_URL: ${SAFEQUERY_APP_POSTGRES_URL:?Missing SAFEQUERY_APP_POSTGRES_URL. Copy .env.example to .env.}
      SAFEQUERY_CORS_ORIGINS: ${SAFEQUERY_CORS_ORIGINS:-http://localhost:3000}
      SAFEQUERY_BACKEND_BASE_URL: ${SAFEQUERY_BACKEND_BASE_URL:-http://backend:8000}
      SAFEQUERY_FRONTEND_BASE_URL: ${SAFEQUERY_FRONTEND_BASE_URL:-http://frontend:3000}
      SAFEQUERY_BUSINESS_POSTGRES_SOURCE_URL: ${SAFEQUERY_BUSINESS_POSTGRES_SOURCE_URL:-}
      SAFEQUERY_BUSINESS_MSSQL_SOURCE_CONNECTION_STRING: ${SAFEQUERY_BUSINESS_MSSQL_SOURCE_CONNECTION_STRING:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:?Missing API_INTERNAL_BASE_URL. Copy .env.example to .env.}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Missing NEXT_PUBLIC_API_BASE_URL. Copy .env.example to .env.}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:?Missing API_INTERNAL_BASE_URL. Copy .env.example to .env.}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Missing NEXT_PUBLIC_API_BASE_URL. Copy .env.example to .env.}
    ports:
      - "3000:3000"

volumes:
  app_postgres_data:
  business_postgres_source_data:
