services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Missing POSTGRES_DB. Copy .env.example to .env.}
      POSTGRES_USER: ${POSTGRES_USER:?Missing POSTGRES_USER. Copy .env.example to .env.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Missing POSTGRES_PASSWORD. Copy .env.example to .env.}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SAFEQUERY_APP_NAME: ${SAFEQUERY_APP_NAME:-SafeQuery API}
      SAFEQUERY_ENVIRONMENT: ${SAFEQUERY_ENVIRONMENT:-development}
      SAFEQUERY_DATABASE_URL: ${SAFEQUERY_DATABASE_URL:?Missing SAFEQUERY_DATABASE_URL. Copy .env.example to .env.}
      SAFEQUERY_CORS_ORIGINS: ${SAFEQUERY_CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:?Missing API_INTERNAL_BASE_URL. Copy .env.example to .env.}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Missing NEXT_PUBLIC_API_BASE_URL. Copy .env.example to .env.}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:?Missing API_INTERNAL_BASE_URL. Copy .env.example to .env.}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Missing NEXT_PUBLIC_API_BASE_URL. Copy .env.example to .env.}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
